<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GestureHub Remote</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #0b0e11;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 36px 20px;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        color: #00ffcc;
        letter-spacing: 0.06em;
        margin-bottom: 28px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        width: 100%;
        max-width: 380px;
      }
      .grid .full {
        grid-column: 1 / -1;
      }
      button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 60px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e0e0e0;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        background: rgba(0, 255, 204, 0.15);
        border-color: #00ffcc;
      }
      button .icon {
        font-size: 1.2rem;
      }
      .status {
        margin-top: 20px;
        font-size: 0.75rem;
        color: #555;
      }
    </style>
  </head>

  <body>
    <h1>GestureHub Remote</h1>

    <div class="grid">
      <button class="full" onclick="send('TOGGLE_PLAY')">
        <span class="icon">⏯</span> Play / Pause
      </button>
      <button onclick="send('PREV_TRACK')">
        <span class="icon">⏮</span> Prev
      </button>
      <button onclick="send('NEXT_TRACK')">
        <span class="icon">⏭</span> Next
      </button>
      <button onclick="send('VOLUME_DOWN')">
        <span class="icon">🔉</span> Vol −
      </button>
      <button onclick="send('VOLUME_UP')">
        <span class="icon">🔊</span> Vol +
      </button>
    </div>

    <p id="feedback" class="status"></p>

    <script>
      var SERVER = "http://" + location.hostname + ":8000/command";

      function send(cmd) {
        var fb = document.getElementById("feedback");
        fb.textContent = "Sending " + cmd + "…";

        fetch(SERVER, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: cmd }),
        })
          .then(function () {
            fb.textContent = cmd + " sent";
          })
          .catch(function () {
            fb.textContent = "Connection error";
          });
      }
    </script>
  </body>
</html>
