services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gesturehub-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-gesturehub-change-me}
      - JWT_EXPIRES_IN=7d
      - DB_PATH=/data/gesturehub.db
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - ESP32_HOST=${ESP32_HOST:-}
      - ESP32_PORT=${ESP32_PORT:-81}
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SOCKET_URL=
    container_name: gesturehub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro

volumes:
  backend-data:
  certs:
